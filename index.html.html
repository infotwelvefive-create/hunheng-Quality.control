<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="QC ฮันเฮง">
<title>QC ฮันเฮง</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --A:#3B6D11;--A-bg:#EAF3DE;--A-mid:#C0DD97;
  --B:#BA7517;--B-bg:#FAEEDA;--B-mid:#FAC775;
  --BB:#185FA5;--BB-bg:#E6F1FB;--BB-mid:#B5D4F4;
  --C:#A32D2D;--C-bg:#FCEBEB;--C-mid:#F7C1C1;
  --bg:#F8F9FA;--bg2:#fff;--border:#E0E0E0;
  --text:#1a1a1a;--text2:#666;--font:'Sarabun',sans-serif;
}
body{background:var(--bg);font-family:var(--font);color:var(--text);min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-bottom:80px}
.nav{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.nav-btn{flex:1;padding:13px 2px;font-size:12px;font-weight:600;color:var(--text2);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;transition:all .15s;font-family:var(--font)}
.nav-btn.on{color:var(--text);border-bottom-color:var(--text)}
.app-title{text-align:center;padding:14px 16px 0;font-size:13px;font-weight:600;color:var(--text2);letter-spacing:.03em}
.sec{padding:14px}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.field{margin-bottom:12px}.field:last-child{margin-bottom:0}
.field label{display:block;font-size:13px;color:var(--text2);margin-bottom:5px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;font-size:15px;font-family:var(--font);border:1px solid var(--border);border-radius:8px;background:#fafafa;color:var(--text);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#999;background:#fff}
.field textarea{resize:none;height:70px}
.grade-row{display:flex;gap:8px}
.gbtn{flex:1;padding:12px 4px 10px;border-radius:10px;border:1.5px solid var(--border);font-size:15px;font-weight:600;cursor:pointer;background:#fafafa;color:var(--text2);line-height:1.3;transition:all .15s;font-family:var(--font);text-align:center}
.gbtn.on-A{background:var(--A-bg);color:var(--A);border-color:var(--A-mid)}
.gbtn.on-B{background:var(--B-bg);color:var(--B);border-color:var(--B-mid)}
.gbtn.on-BB{background:var(--BB-bg);color:var(--BB);border-color:var(--BB-mid)}
.gbtn.on-C{background:var(--C-bg);color:var(--C);border-color:var(--C-mid)}
.qty-row{display:flex;align-items:center;gap:8px}
.qbtn{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);background:#fafafa;font-size:22px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font)}
.qty-num{flex:1;text-align:center;font-size:28px;font-weight:600}
.qty-inp{width:64px;text-align:center;font-size:15px;padding:8px 4px;border:1px solid var(--border);border-radius:8px;background:#fafafa;color:var(--text);font-family:var(--font)}
.quick-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.quick-btn{padding:13px 8px;border-radius:12px;border:2px solid;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;line-height:1.3;text-align:center}
.quick-btn.pass{border-color:var(--A-mid);background:var(--A-bg);color:var(--A)}
.quick-btn.pass.active{background:var(--A);color:#fff;border-color:var(--A)}
.quick-btn.bb{border-color:var(--BB-mid);background:var(--BB-bg);color:var(--BB)}
.quick-btn.bb.active{background:var(--BB);color:#fff;border-color:var(--BB)}
.defect-section{margin-bottom:14px}
.defect-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.defect-cat{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text)}
.sel-all{font-size:12px;color:var(--text2);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:6px;font-family:var(--font)}
.defect-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.dc{position:relative;border:1px solid var(--border);border-radius:10px;padding:10px 10px 8px;cursor:pointer;transition:all .15s;background:#fafafa;user-select:none}
.dc.checked{background:var(--C-bg);border-color:var(--C-mid)}
.dc.checked .dc-label{color:var(--C)}
.dc.disabled{opacity:.4;pointer-events:none}
.dc input[type=checkbox]{position:absolute;top:8px;right:8px;width:15px;height:15px;cursor:pointer;accent-color:var(--C)}
.dc-label{font-size:12px;font-weight:600;color:var(--text);display:block;margin-bottom:2px;padding-right:20px;line-height:1.3}
.dc-cnt{font-size:11px;color:var(--text2)}
.grade-suggest{border-radius:10px;padding:12px 14px;font-size:14px;display:flex;align-items:center;gap:10px;margin-bottom:10px;transition:all .3s}
.gs-icon{font-size:20px}
.gs-text .gs-main{font-weight:600}
.gs-text .gs-sub{font-size:12px;opacity:.8;margin-top:1px}
.gs-A{background:var(--A-bg);color:var(--A)}
.gs-B{background:var(--B-bg);color:var(--B)}
.gs-BB{background:var(--BB-bg);color:var(--BB)}
.gs-C{background:var(--C-bg);color:var(--C)}
.gs-none{background:#f0f0f0;color:var(--text2)}
.photo-zone{border:1.5px dashed #ccc;border-radius:10px;padding:14px;text-align:center;cursor:pointer;background:#fafafa}
.pz-icon{font-size:28px;margin-bottom:6px}
.pz-text{font-size:13px;color:var(--text2)}
.photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.photo-thumb{position:relative;width:72px;height:72px}
.photo-thumb img{width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
.photo-del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--C-bg);color:var(--C);border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;font-family:var(--font)}
.sub-btn{width:100%;padding:15px;border-radius:12px;border:none;background:#1a1a1a;color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:4px;transition:opacity .15s}
.sub-btn:disabled{opacity:.35;cursor:default}
.sub-btn:active:not(:disabled){opacity:.8}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:5px;margin-bottom:12px}
.stat-box{padding:8px 4px;border-radius:10px;text-align:center}
.stat-box .sl{font-size:10px;margin-bottom:2px;font-weight:500}
.stat-box .sv{font-size:18px;font-weight:700}
.s-tot{background:#f0f0f0;color:var(--text)}.s-tot .sl{color:var(--text2)}
.s-A{background:var(--A-bg);color:var(--A)}.s-B{background:var(--B-bg);color:var(--B)}
.s-BB{background:var(--BB-bg);color:var(--BB)}.s-C{background:var(--C-bg);color:var(--C)}
.log-item{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px}
.log-item:last-child{border-bottom:none}
.gbadge{width:36px;height:36px;border-radius:8px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gb-A{background:var(--A-bg);color:var(--A)}.gb-B{background:var(--B-bg);color:var(--B)}
.gb-BB{background:var(--BB-bg);color:var(--BB)}.gb-C{background:var(--C-bg);color:var(--C)}
.log-body{flex:1;min-width:0}
.log-main{font-size:14px;font-weight:600}
.log-sub{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.4}
.defect-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.dtag{font-size:11px;padding:2px 7px;border-radius:6px;background:var(--C-bg);color:var(--C);font-weight:500}
.log-photos{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.log-photos img{width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer}
.log-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.log-qty{font-size:14px;font-weight:600}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:14px;padding:2px 4px;border-radius:6px}
.period-row{display:flex;gap:6px;margin-bottom:12px}
.period-btn{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:#fafafa;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--text2);transition:all .15s}
.period-btn.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.tailor-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.tailor-row:last-child{border-bottom:none}
.tg{padding:2px 6px;border-radius:6px;font-size:11px;font-weight:600}
.tg-A{background:var(--A-bg);color:var(--A)}.tg-B{background:var(--B-bg);color:var(--B)}
.tg-BB{background:var(--BB-bg);color:var(--BB)}.tg-C{background:var(--C-bg);color:var(--C)}
.exp-box{background:#f5f5f5;border-radius:8px;padding:10px;font-size:11px;font-family:monospace;white-space:pre-wrap;color:#555;max-height:200px;overflow-y:auto;margin-top:8px;line-height:1.5}
.copy-btn{width:100%;padding:11px;border-radius:8px;border:1px solid var(--border);background:#fafafa;font-size:14px;font-family:var(--font);color:var(--text);cursor:pointer;margin-top:8px;font-weight:500}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999;font-family:var(--font)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:999}
.lightbox img{max-width:90vw;max-height:85vh;border-radius:8px}
.lb-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
</style>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
  <div class="app-title">QC HUNHENG 🧵</div>
  <div class="nav">
    <button class="nav-btn on" onclick="tab('form')">+ บันทึก</button>
    <button class="nav-btn" onclick="tab('log')">รายการ</button>
    <button class="nav-btn" onclick="tab('sum')">สรุป</button>
    <button class="nav-btn" onclick="tab('report')">รายงาน</button>
  </div>

  <div id="t-form">
    <div class="sec">
      <div class="card">
        <div class="field">
          <label>ช่างผู้ผลิต *</label>
          <input id="f-tailor" type="text" placeholder="ชื่อช่าง" list="tailor-list" oninput="chk()">
          <datalist id="tailor-list"></datalist>
        </div>
        <div class="field">
          <label>รหัส / ชื่อสินค้า *</label>
          <input id="f-prod" type="text" placeholder="เช่น เสื้อเชิ้ต-WH001" oninput="chk()">
        </div>
        <div class="field">
          <label>ล็อต / รุ่นผลิต</label>
          <input id="f-lot" type="text" placeholder="เช่น LOT2503-A">
        </div>
      </div>
      <div class="card">
        <div class="card-title">จำนวนชิ้น</div>
        <div class="qty-row">
          <button class="qbtn" onclick="dq(-1)">−</button>
          <div class="qty-num" id="qnum">1</div>
          <button class="qbtn" onclick="dq(1)">+</button>
          <input class="qty-inp" id="f-qty" type="number" value="1" min="1" oninput="sqty(this.value)">
          <span style="font-size:13px;color:var(--text2)">ชิ้น</span>
        </div>
      </div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-size:15px;font-weight:600">จุดบกพร่องที่พบ</div>
          <button class="sel-all" onclick="clearAll()" style="color:var(--text2)">ล้างทั้งหมด</button>
        </div>
        <div class="quick-row">
          <button class="quick-btn pass" id="btn-pass" onclick="toggleQuick('pass')">
            ✓ ไม่พบข้อบกพร่อง<br><span style="font-size:11px;font-weight:400">→ แนะนำเกรด A</span>
          </button>
          <button class="quick-btn bb" id="btn-bb" onclick="toggleQuick('bb')">
            🔄 แก้ไขรอบที่ 2<br><span style="font-size:11px;font-weight:400">→ แนะนำเกรด BB</span>
          </button>
        </div>
        <div id="defect-form"></div>
        <div class="field" style="margin-top:4px">
          <label>หมายเหตุ (ระบุตำแหน่ง)</label>
          <textarea id="f-note" placeholder="เช่น ตะเข็บบ่าขวา 2 ตัว, คราบหน้าอก 1 ตัว..."></textarea>
        </div>
      </div>
      <div class="grade-suggest gs-none" id="gs-box">
        <div class="gs-icon">?</div>
        <div class="gs-text">
          <div class="gs-main">กดปุ่มด้านบนหรือเลือกจุดบกพร่อง</div>
          <div class="gs-sub">ระบบจะแนะนำเกรดอัตโนมัติ</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">เกรดสุดท้าย * <span style="font-weight:400;text-transform:none">(ปรับแก้ได้)</span></div>
        <div class="grade-row" id="grade-row-main">
          <button class="gbtn" id="gb-A" onclick="selGrade('A')">A<br><span style="font-size:11px;font-weight:400">ผ่าน / ดี</span></button>
          <button class="gbtn" id="gb-B" onclick="selGrade('B')">B<br><span style="font-size:11px;font-weight:400">แก้ไขได้</span></button>
          <button class="gbtn" id="gb-C" onclick="selGrade('C')">C<br><span style="font-size:11px;font-weight:400">ตีคืน</span></button>
        </div>
        <div id="bb-badge" style="display:none;margin-top:10px;padding:10px 12px;background:var(--BB-bg);border-radius:8px;color:var(--BB);font-size:13px;font-weight:600;text-align:center">
          🔄 เกรด BB — แก้ไขรอบที่ 2
        </div>
      </div>
      <div class="card">
        <div class="card-title">ภาพถ่ายประกอบ</div>
        <div class="photo-zone" onclick="document.getElementById('photo-inp').click()">
          <div class="pz-icon">📷</div>
          <div class="pz-text">แตะเพื่อถ่ายรูปหรือเลือกจากแกลเลอรี่</div>
        </div>
        <input type="file" id="photo-inp" accept="image/*" multiple capture="environment" style="display:none" onchange="addPhotos(this)">
        <div class="photo-grid" id="photo-grid"></div>
      </div>
      <button class="sub-btn" id="sub-btn" onclick="submit()" disabled>บันทึก QC</button>
    </div>
  </div>

  <div id="t-log" style="display:none">
    <div class="sec"><div id="log-stats"></div></div>
    <div class="card" style="margin:0 14px;padding:0;overflow:hidden"><div id="log-list"></div></div>
  </div>

  <div id="t-sum" style="display:none">
    <div class="sec">
      <div class="period-row">
        <button class="period-btn on" id="pb-today" onclick="setPeriod('today')">วันนี้</button>
        <button class="period-btn" id="pb-week" onclick="setPeriod('week')">สัปดาห์นี้</button>
      </div>
      <div id="sum-content"></div>
    </div>
  </div>

  <div id="t-report" style="display:none">
    <div class="sec">
      <div class="period-row">
        <button class="period-btn on" id="rb-today" onclick="setRPeriod('today')">วันนี้</button>
        <button class="period-btn" id="rb-week" onclick="setRPeriod('week')">สัปดาห์นี้</button>
      </div>
      <div class="card">
        <div class="card-title">รายงานสำหรับส่ง Honey</div>
        <div class="exp-box" id="exp-box"></div>
        <button class="copy-btn" onclick="copyExp()">คัดลอกรายงาน</button>
      </div>
      <div class="card" style="margin-top:4px">
        <div class="card-title" style="margin-bottom:8px">ช่างที่มีเกรด C มากที่สุด</div>
        <div id="c-rank"></div>
      </div>
      <div class="card" style="margin-top:4px">
        <div class="card-title" style="margin-bottom:8px">จุดบกพร่องที่พบบ่อยที่สุด</div>
        <div id="defect-rank"></div>
      </div>
    </div>
  </div>
</div>

<div class="lightbox" id="lb" onclick="closeLB()">
  <button class="lb-close" onclick="closeLB()">✕</button>
  <img id="lb-img" src="" alt="">
</div>
<div class="toast" id="toast"></div>

<script>
const DEFECT_CATS=[
  {id:'stitch',label:'การตัดเย็บ',ico:'🧵',items:[
    {id:'s1',label:'ตะเข็บหลุด/โล้'},{id:'s2',label:'ด้ายขาดกลางตัด'},
    {id:'s3',label:'เส้นด้ายเกิน'},{id:'s4',label:'ผ้าย่นหน้าตะเข็บ'},
    {id:'s5',label:'กระดุมหลุด/ผิดที่'},{id:'s6',label:'ซิปชำรุด/ติด'},
  ]},
  {id:'fabric',label:'ผ้าและสี',ico:'🎨',items:[
    {id:'f1',label:'คราบ/เปื้อน'},{id:'f2',label:'รู/ขาด'},
    {id:'f3',label:'สีไม่สม่ำเสมอ'},{id:'f4',label:'สีซีด/ตก'},
    {id:'f5',label:'ผ้าเป็นขุย'},{id:'f6',label:'กลิ่นผิดปกติ'},
  ]},
  {id:'size',label:'ขนาดและรูปทรง',ico:'📐',items:[
    {id:'z1',label:'ขนาดผิดแบบ'},{id:'z2',label:'ซ้าย-ขวาไม่เท่า'},
    {id:'z3',label:'ผ้าหด'},{id:'z4',label:'พิมพ์ผิดที่'},
  ]},
  {id:'label',label:'ป้ายและอุปกรณ์',ico:'🏷️',items:[
    {id:'l1',label:'ป้ายหาย/ผิด'},{id:'l2',label:'ป้ายไซส์ผิด'},
    {id:'l3',label:'กบ/เชือกชำรุด'},{id:'l4',label:'ชายผ้าไม่เสมอ'},
  ]}
];
const DW={s1:2,s2:2,s6:2,f2:2,z1:2,z2:2,s3:1,s4:1,s5:1,f1:1,f3:1,f4:1,f5:1,f6:1,z3:1,z4:1,l1:1,l2:1,l3:1,l4:1};
const MG=['A','B','C'];
let records=[];
try{records=JSON.parse(localStorage.getItem('hunheng_qc')||'[]');}catch(e){}
let grade='',qty=1,photos=[],period='today',rPeriod='today',checkedDefects={},quickMode='';
function save(){try{localStorage.setItem('hunheng_qc',JSON.stringify(records));}catch(e){}}
function tab(t){
  ['form','log','sum','report'].forEach(id=>document.getElementById('t-'+id).style.display=id===t?'':'none');
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('on',['form','log','sum','report'][i]===t));
  if(t==='log')renderLog();if(t==='sum')renderSum();if(t==='report')renderReport();
}
function toggleQuick(mode){
  if(quickMode===mode){quickMode='';resetQUI();return;}
  quickMode=mode;
  document.getElementById('btn-pass').classList.remove('active');
  document.getElementById('btn-bb').classList.remove('active');
  document.getElementById('btn-'+mode).classList.add('active');
  DEFECT_CATS.forEach(cat=>cat.items.forEach(item=>{
    checkedDefects[item.id]=0;
    document.getElementById('dc-'+item.id).classList.remove('checked');
    document.getElementById('chk-'+item.id).checked=false;
    document.getElementById('dc-'+item.id).classList.add('disabled');
  }));
  if(mode==='pass'){
    setGS('A','ไม่พบข้อบกพร่อง → ผ่านเกรด A');
    showMG(true);grade='A';
    MG.forEach(g=>document.getElementById('gb-'+g).className='gbtn'+(g==='A'?' on-A':''));
  } else {
    setGS('BB','ส่งแก้ไขรอบที่ 2 → แนะนำเกรด BB');
    showMG(false);grade='BB';
  }
  chk();
}
function showMG(show){
  document.getElementById('bb-badge').style.display=show?'none':'block';
  document.getElementById('grade-row-main').style.display=show?'flex':'none';
}
function resetQUI(){
  document.getElementById('btn-pass').classList.remove('active');
  document.getElementById('btn-bb').classList.remove('active');
  DEFECT_CATS.forEach(cat=>cat.items.forEach(item=>document.getElementById('dc-'+item.id).classList.remove('disabled')));
  setGS(null,'กดปุ่มด้านบนหรือเลือกจุดบกพร่อง');
  showMG(true);grade='';MG.forEach(g=>document.getElementById('gb-'+g).className='gbtn');chk();
}
function buildDF(){
  document.getElementById('defect-form').innerHTML=DEFECT_CATS.map(cat=>`
    <div class="defect-section">
      <div class="defect-header">
        <div class="defect-cat"><span>${cat.ico}</span>${cat.label}</div>
        <button class="sel-all" onclick="selAllCat('${cat.id}')" style="color:#888">เลือกทั้งหมด</button>
      </div>
      <div class="defect-grid">
        ${cat.items.map(item=>`
          <div class="dc" id="dc-${item.id}" onclick="toggleD('${item.id}')">
            <input type="checkbox" id="chk-${item.id}" onclick="event.stopPropagation();toggleD('${item.id}')">
            <span class="dc-label">${item.label}</span>
            <span class="dc-cnt" id="cnt-${item.id}"></span>
          </div>`).join('')}
      </div>
    </div>`).join('');
  DEFECT_CATS.forEach(cat=>cat.items.forEach(item=>{
    const f=records.filter(r=>r.defects&&r.defects[item.id]).length;
    document.getElementById('cnt-'+item.id).textContent=f>0?'×'+f:'';
  }));
}
function toggleD(id){
  if(quickMode)return;
  checkedDefects[id]=checkedDefects[id]?0:1;
  const on=!!checkedDefects[id];
  document.getElementById('dc-'+id).classList.toggle('checked',on);
  document.getElementById('chk-'+id).checked=on;
  autoGrade();chk();
}
function selAllCat(catId){
  if(quickMode)return;
  const cat=DEFECT_CATS.find(c=>c.id===catId);if(!cat)return;
  const allOn=cat.items.every(item=>checkedDefects[item.id]);
  cat.items.forEach(item=>{
    checkedDefects[item.id]=allOn?0:1;
    document.getElementById('dc-'+item.id).classList.toggle('checked',!allOn);
    document.getElementById('chk-'+item.id).checked=!allOn;
  });
  autoGrade();chk();
}
function clearAll(){
  quickMode='';resetQUI();
  DEFECT_CATS.forEach(cat=>cat.items.forEach(item=>{
    checkedDefects[item.id]=0;
    document.getElementById('dc-'+item.id).classList.remove('checked','disabled');
    document.getElementById('chk-'+item.id).checked=false;
  }));
  setGS(null,'กดปุ่มด้านบนหรือเลือกจุดบกพร่อง');
  grade='';MG.forEach(g=>document.getElementById('gb-'+g).className='gbtn');chk();
}
function setGS(g,reason){
  const box=document.getElementById('gs-box');
  if(!g){box.className='grade-suggest gs-none';box.innerHTML=`<div class="gs-icon">?</div><div class="gs-text"><div class="gs-main">${reason}</div><div class="gs-sub">ระบบจะแนะนำเกรดอัตโนมัติ</div></div>`;}
  else{const icons={A:'✅',B:'⚠️',BB:'🔄',C:'❌'};box.className=`grade-suggest gs-${g}`;box.innerHTML=`<div class="gs-icon">${icons[g]}</div><div class="gs-text"><div class="gs-main">แนะนำ เกรด ${g}</div><div class="gs-sub">${reason}</div></div>`;}
}
function autoGrade(){
  const sel=Object.keys(checkedDefects).filter(id=>checkedDefects[id]);
  if(!sel.length){setGS(null,'กดปุ่มด้านบนหรือเลือกจุดบกพร่อง');return;}
  const hasC=sel.some(id=>DW[id]===2),hasB=sel.some(id=>DW[id]===1);
  if(hasC){setGS('C','มีข้อบกพร่องระดับตีคืน → แนะนำ เกรด C');selGrade('C');}
  else if(hasB){setGS('B','มีข้อบกพร่องที่แก้ไขได้ → แนะนำ เกรด B');selGrade('B');}
  else{setGS('A','ไม่พบข้อบกพร่องร้ายแรง → แนะนำ เกรด A');selGrade('A');}
}
function selGrade(g){grade=g;MG.forEach(x=>document.getElementById('gb-'+x).className='gbtn'+(x===g?' on-'+x:''));chk();}
function dq(d){qty=Math.max(1,qty+d);sync();}
function sqty(v){qty=Math.max(1,parseInt(v)||1);document.getElementById('qnum').textContent=qty;}
function sync(){document.getElementById('qnum').textContent=qty;document.getElementById('f-qty').value=qty;}
function chk(){document.getElementById('sub-btn').disabled=!(document.getElementById('f-tailor').value.trim()&&document.getElementById('f-prod').value.trim()&&grade);}
function addPhotos(inp){Array.from(inp.files).forEach(file=>{const r=new FileReader();r.onload=e=>{photos.push(e.target.result);renderPG();};r.readAsDataURL(file);});inp.value='';}
function renderPG(){document.getElementById('photo-grid').innerHTML=photos.map((src,i)=>`<div class="photo-thumb"><img src="${src}" onclick="openLB('${src}')"><button class="photo-del" onclick="rmP(${i})">✕</button></div>`).join('');}
function rmP(i){photos.splice(i,1);renderPG();}
function submit(){
  const now=new Date();
  const ds={};DEFECT_CATS.forEach(cat=>cat.items.forEach(item=>{if(checkedDefects[item.id])ds[item.id]=1;}));
  const dl=DEFECT_CATS.flatMap(cat=>cat.items.filter(item=>ds[item.id]).map(item=>item.label));
  const rec={id:Date.now(),date:fmtDate(now),time:now.toTimeString().slice(0,5),
    tailor:document.getElementById('f-tailor').value.trim(),
    prod:document.getElementById('f-prod').value.trim(),
    lot:document.getElementById('f-lot').value.trim(),
    grade,qty,defects:ds,defectLabels:dl,quickMode,
    note:document.getElementById('f-note').value.trim(),photos:[...photos]};
  records.push(rec);save();updateSugg(rec.tailor);
  ['f-prod','f-lot','f-note'].forEach(id=>document.getElementById(id).value='');
  photos=[];renderPG();qty=1;sync();
  quickMode='';grade='';showMG(true);MG.forEach(g=>document.getElementById('gb-'+g).className='gbtn');
  clearAll();chk();
  toast('บันทึกแล้ว ✓  เกรด '+rec.grade+' — '+rec.tailor+' ('+rec.qty+'ชิ้น)');
  buildDF();
}
function updateSugg(name){const dl=document.getElementById('tailor-list');if(!Array.from(dl.options).map(o=>o.value).includes(name)){const o=document.createElement('option');o.value=name;dl.appendChild(o);}}
function fmtDate(d){return d.toLocaleDateString('th-TH',{year:'numeric',month:'2-digit',day:'2-digit'});}
function todayStr(){return fmtDate(new Date());}
function weekStart(){const d=new Date();d.setHours(0,0,0,0);const day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return d;}
function filterRecs(p){
  const today=todayStr();if(p==='today')return records.filter(r=>r.date===today);
  const ws=weekStart();
  return records.filter(r=>{const parts=r.date.split('/');if(parts.length<3)return false;const d=new Date(parseInt(parts[2])-543,parseInt(parts[1])-1,parseInt(parts[0]));return d>=ws;});
}
function calcStats(recs){const s={A:0,B:0,BB:0,C:0,total:0};recs.forEach(r=>{s[r.grade]=(s[r.grade]||0)+r.qty;s.total+=r.qty;});return s;}
function statsHTML(s){
  const pct=g=>s.total?Math.round((s[g]||0)/s.total*100):0;
  return `<div class="stat-row">
    <div class="stat-box s-tot"><div class="sl">รวม</div><div class="sv">${s.total}</div></div>
    <div class="stat-box s-A"><div class="sl">A</div><div class="sv">${s.A||0}<span style="font-size:10px"> ${pct('A')}%</span></div></div>
    <div class="stat-box s-B"><div class="sl">B</div><div class="sv">${s.B||0}<span style="font-size:10px"> ${pct('B')}%</span></div></div>
    <div class="stat-box s-BB"><div class="sl">BB</div><div class="sv">${s.BB||0}<span style="font-size:10px"> ${pct('BB')}%</span></div></div>
    <div class="stat-box s-C"><div class="sl">C</div><div class="sv">${s.C||0}<span style="font-size:10px"> ${pct('C')}%</span></div></div>
  </div>`;
}
function renderLog(){
  const recs=filterRecs('today').slice().reverse();
  document.getElementById('log-stats').innerHTML=statsHTML(calcStats(filterRecs('today')));
  const list=document.getElementById('log-list');
  if(!recs.length){list.innerHTML='<div class="empty">ยังไม่มีข้อมูล QC วันนี้</div>';return;}
  list.innerHTML=recs.map(r=>`
    <div class="log-item">
      <div class="gbadge gb-${r.grade}">${r.grade}</div>
      <div class="log-body">
        <div class="log-main">${r.prod}${r.lot?' · '+r.lot:''}</div>
        <div class="log-sub">${r.tailor} · ${r.time}${r.quickMode==='pass'?' · ไม่พบข้อบกพร่อง':r.quickMode==='bb'?' · แก้ไขรอบที่ 2':''}${r.note?' — '+r.note:''}</div>
        ${r.defectLabels&&r.defectLabels.length?`<div class="defect-tags">${r.defectLabels.map(l=>`<span class="dtag">${l}</span>`).join('')}</div>`:''}
        ${r.photos&&r.photos.length?`<div class="log-photos">${r.photos.map(src=>`<img src="${src}" onclick="openLB('${src}')">`).join('')}</div>`:''}
      </div>
      <div class="log-right">
        <div class="log-qty">${r.qty}ชิ้น</div>
        <button class="del-btn" onclick="delRec(${r.id})">✕</button>
      </div>
    </div>`).join('');
}
function delRec(id){records=records.filter(r=>r.id!==id);save();renderLog();}
function setPeriod(p){period=p;['today','week'].forEach(x=>document.getElementById('pb-'+x).classList.toggle('on',x===p));renderSum();}
function setRPeriod(p){rPeriod=p;['today','week'].forEach(x=>document.getElementById('rb-'+x).classList.toggle('on',x===p));renderReport();}
function renderSum(){
  const recs=filterRecs(period);const s=calcStats(recs);
  const tm={};
  recs.forEach(r=>{if(!tm[r.tailor])tm[r.tailor]={A:0,B:0,BB:0,C:0,total:0};tm[r.tailor][r.grade]=(tm[r.tailor][r.grade]||0)+r.qty;tm[r.tailor].total+=r.qty;});
  const rows=Object.entries(tm).sort((a,b)=>b[1].total-a[1].total);
  const label=period==='today'?'วันนี้ — '+todayStr():'สัปดาห์นี้';
  document.getElementById('sum-content').innerHTML=`
    <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">${label}</div>
    ${statsHTML(s)}
    <div class="card" style="margin-top:4px">
      <div class="card-title">สรุปตามช่าง</div>
      ${rows.length?rows.map(([n,d])=>`
        <div class="tailor-row"><span style="font-weight:500">${n}</span>
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end">
            <div style="display:flex;gap:3px">
              <span class="tg tg-A">A ${d.A||0}</span><span class="tg tg-B">B ${d.B||0}</span>
              <span class="tg tg-BB">BB ${d.BB||0}</span><span class="tg tg-C">C ${d.C||0}</span>
            </div>
            <span style="font-size:12px;color:var(--text2)">${d.total}ชิ้น</span>
          </div>
        </div>`).join(''):'<div style="font-size:13px;color:var(--text2);padding:8px 0">ยังไม่มีข้อมูล</div>'}
    </div>`;
}
function renderReport(){
  const recs=filterRecs(rPeriod);const s=calcStats(recs);
  const pct=g=>s.total?Math.round((s[g]||0)/s.total*100):0;
  const label=rPeriod==='today'?'วันที่ '+todayStr():'สัปดาห์นี้ ('+fmtDate(weekStart())+' – '+todayStr()+')';
  const cMap={};recs.filter(r=>r.grade==='C').forEach(r=>{cMap[r.tailor]=(cMap[r.tailor]||0)+r.qty;});
  document.getElementById('c-rank').innerHTML=Object.entries(cMap).sort((a,b)=>b[1]-a[1]).length?
    Object.entries(cMap).sort((a,b)=>b[1]-a[1]).map(([n,q],i)=>`<div class="tailor-row"><span>${i+1}. ${n}</span><span style="color:var(--C);font-weight:600">${q} ชิ้น</span></div>`).join(''):
    '<div style="font-size:13px;color:var(--text2);padding:8px 0">ไม่มีเกรด C 🎉</div>';
  const dMap={};DEFECT_CATS.forEach(cat=>cat.items.forEach(item=>{dMap[item.id]={label:item.label,count:0};}));
  recs.forEach(r=>{if(r.defects)Object.keys(r.defects).forEach(id=>{if(dMap[id])dMap[id].count+=r.qty;});});
  const dRank=Object.values(dMap).filter(d=>d.count>0).sort((a,b)=>b.count-a.count).slice(0,5);
  document.getElementById('defect-rank').innerHTML=dRank.length?
    dRank.map((d,i)=>`<div class="tailor-row"><span>${i+1}. ${d.label}</span><span style="color:var(--C);font-weight:600">${d.count} ชิ้น</span></div>`).join(''):
    '<div style="font-size:13px;color:var(--text2);padding:8px 0">ยังไม่มีข้อมูลจุดบกพร่อง</div>';
  const tm={};recs.forEach(r=>{if(!tm[r.tailor])tm[r.tailor]={A:0,B:0,BB:0,C:0};tm[r.tailor][r.grade]=(tm[r.tailor][r.grade]||0)+r.qty;});
  const lines=['=== รายงาน QC — ฮันเฮง ===',label,'─────────────────────────',
    `รวมตรวจ : ${s.total} ชิ้น`,`เกรด A   : ${s.A||0} ชิ้น (${pct('A')}%)`,
    `เกรด B   : ${s.B||0} ชิ้น (${pct('B')}%)`,`เกรด BB  : ${s.BB||0} ชิ้น (${pct('BB')}%) ← แก้ไขรอบ 2`,
    `เกรด C   : ${s.C||0} ชิ้น (${pct('C')}%)`,
    '─────────────────────────','สรุปตามช่าง:'];
  Object.entries(tm).forEach(([n,d])=>lines.push(`  ${n} → A:${d.A||0} B:${d.B||0} BB:${d.BB||0} C:${d.C||0}`));
  if(dRank.length){lines.push('─────────────────────────','จุดบกพร่องที่พบบ่อย:');dRank.forEach((d,i)=>lines.push(`  ${i+1}. ${d.label} (${d.count} ชิ้น)`));}
  lines.push('─────────────────────────');
  recs.forEach(r=>{
    const ql=r.quickMode==='pass'?' | ไม่พบข้อบกพร่อง':r.quickMode==='bb'?' | แก้ไขรอบที่ 2':'';
    const ds=r.defectLabels&&r.defectLabels.length?' | '+r.defectLabels.join(', '):ql;
    const img=r.photos&&r.photos.length?` [ภาพ ${r.photos.length} รูป]`:'';
    lines.push(`[${r.time}] ${r.grade} | ${r.tailor} | ${r.prod}${r.lot?' ('+r.lot+')':''} | ${r.qty}ชิ้น${ds}${r.note?' | '+r.note:''}${img}`);
  });
  lines.push('─────────────────────────','รายงานโดย: เพชร (QC Hunheng)');
  document.getElementById('exp-box').textContent=lines.join('\n');
}
function copyExp(){navigator.clipboard.writeText(document.getElementById('exp-box').textContent).then(()=>toast('คัดลอกรายงานแล้ว ✓')).catch(()=>toast('กรุณาคัดลอกด้วยตนเอง'));}
function openLB(src){document.getElementById('lb-img').src=src;document.getElementById('lb').style.display='flex';}
function closeLB(){document.getElementById('lb').style.display='none';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
buildDF();records.forEach(r=>updateSugg(r.tailor));
</script>
</body>
</html>
